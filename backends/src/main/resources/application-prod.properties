# Server
server.port=8080
server.tomcat.max-connections=10000
server.tomcat.accept-count=100
server.tomcat.max-threads=500

# Database (Railway provides these)
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Redis (Railway provides these)
spring.data.redis.host=${REDISHOST}
spring.data.redis.port=${REDISPORT}
spring.data.redis.password=${REDISPASSWORD}
spring.data.redis.timeout=60000
spring.data.redis.lettuce.pool.max-active=20
spring.data.redis.lettuce.pool.max-idle=10
spring.data.redis.lettuce.pool.min-idle=2

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=3600000

# Mail (use environment variables or keep as is if using same email)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Frontend URL (update after frontend deploy)
app.frontend-url=${FRONTEND_URL:http://localhost:3000}

# Connection pool
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:50}

# Rate limiter \u2013 enable in production
rate-limiter.enabled=true

# Logging
logging.level.com.qrplatform.backend=INFO
logging.level.org.springframework.security=INFO